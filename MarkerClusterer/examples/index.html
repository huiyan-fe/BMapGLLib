<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>MarkerClusterer for Baidu Map GL Example</title>
    <style type="text/css">
        #mapDiv1 { height:400px; width:600px; margin:20px; border:1px solid #ccc; }
        #mapDiv2 { height:400px; width:600px; margin:20px; left:620px; top:-420px; border:1px solid #ccc; }
    </style>
    <script type="text/javascript" src="//api.map.baidu.com/api?v=1.0&type=webgl&ak=您的密钥"></script>
    <script type="text/javascript" src="../src/MarkerClusterer.js"></script>
</head>
<body>
    <input id="btnText" type="button" value="改变GridSize" />
    <input id="btnPoint" type="button" value="改变MaxZoom" />
    <input id="btnStyles" type="button" value="改变Styles" />
    <input id="btnAddMarkers" type="button" value="添加Markers" />
    <input id="btnRemoveMarkers" type="button" value="删除Markers" />
    <div id="mapDiv1"></div>
    <div id="mapDiv2"></div>

    <script type="text/javascript">
        // 创建左侧地图（聚合器）
        var map = new BMapGL.Map("mapDiv1");
        map.enableScrollWheelZoom(true);
        var point = new BMapGL.Point(116.404, 39.915);
        map.centerAndZoom(point, 4);
        // 创建右侧地图（原始点对比）
        var map2 = new BMapGL.Map("mapDiv2");
        map2.enableScrollWheelZoom(true);
        map2.centerAndZoom(point, 4);
        map.addEventListener("zoomend", function () {
            console.log(map.getZoom())
            map2.centerAndZoom(map.getCenter(), map.getZoom());
        });
        map.addEventListener("moveend", function () {
            map2.centerAndZoom(map.getCenter(), map.getZoom());
        });
        // 生成初始标记
        var MAX = 60;
        var markers = [];
        var pt = null;
        var i = 0;
        for (; i < MAX; i++) {
            pt = new BMapGL.Point(Math.random() * 40 + 85, Math.random() * 30 + 21);
            markers.push(new BMapGL.Marker(pt));
            map2.addOverlay(new BMapGL.Marker(pt));
        }
        // 创建聚合器（左侧地图）
        var markerClusterer = new BMapGLLib.MarkerClusterer(map, {
            markers: markers,
            gridSize: 60,
            maxZoom: 18,
            minClusterSize: 2,
            isAverageCenter: true
        });
        // 改变 GridSize
        var btnOpen = document.getElementById('btnText');
        btnOpen.onclick = function (event) {
            markerClusterer.setGridSize(120);
        };
        // 改变 MaxZoom
        var btnClose = document.getElementById('btnPoint');
        btnClose.onclick = function () {
            markerClusterer.setMaxZoom(7);
            map.setZoom(map.getZoom());
        };
        // 自定义样式
        var myStyles = [
            {
                url: './images/heart30.png',
                size: new BMapGL.Size(30, 26),
                opt_anchor: [16, 0],
                textColor: '#ff00ff',
                opt_textSize: 10
            },
            {
                url: './images/heart40.png',
                size: new BMapGL.Size(40, 35),
                opt_anchor: [40, 35],
                textColor: '#ff0000',
                opt_textSize: 12
            },
            {
                url: './images/heart50.png',
                size: new BMapGL.Size(50, 44),
                opt_anchor: [32, 0],
                textColor: 'white',
                opt_textSize: 14
            }
        ];
        var btnStyles = document.getElementById('btnStyles');
        btnStyles.onclick = function (event) {
            markerClusterer.setStyles(myStyles);
        };
        // 添加和删除 Markers
        var newMarkers = getNewMarkers(MAX);
        var newMarkers2 = newMarkers;
        var btnAddMarkers = document.getElementById('btnAddMarkers');
        btnAddMarkers.onclick = function (event) {
            if (!newMarkers.length) {
                newMarkers = getNewMarkers(MAX);
                newMarkers2 = newMarkers;
            }
            markerClusterer.addMarkers(newMarkers);
            for (var j = 0; j < MAX; j++) {
                map2.addOverlay(newMarkers2[j]);
            }
        };
        var btnRemoveMarkers = document.getElementById('btnRemoveMarkers');
        btnRemoveMarkers.onclick = function (event) {
            if (newMarkers.length === 0) return;
            markerClusterer.removeMarkers(newMarkers);
            for (var j = 0; j < MAX; j++) {
                map2.removeOverlay(newMarkers2[j]);
            }
            newMarkers = [];
            newMarkers2 = [];
        };
        /**
         * 得到一个随机的 marker 数组。
         * @param {Number} MAX 数组的长度
         * @return {Array} 随机 marker 数组
         */
        function getNewMarkers(MAX) {
            var newMarkers = [];
            for (var i = 0; i < MAX; i++) {
                var pt = new BMapGL.Point(Math.random() * 40 + 85, Math.random() * 30 + 21);
                newMarkers.push(new BMapGL.Marker(pt));
            }
            return newMarkers;
        }
    </script>
</body>
</html>
