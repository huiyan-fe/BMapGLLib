<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <title>MarkerClusterer for BMapGL - Example</title>
  <style>
    body, html { width: 100%; height: 100%; margin: 0; padding: 0; }
    #container { width: 100%; height: 100%; }
    .ctrl { position: fixed; top: 16px; left: 16px; z-index: 999; display: flex; flex-wrap: wrap; gap: 8px; }
    .ctrl button {
      padding: 8px 14px; background: #fff; border: 1px solid #2468f2;
      border-radius: 6px; color: #2468f2; font-size: 13px; cursor: pointer;
    }
    .ctrl button:hover { background: #2468f2; color: #fff; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="ctrl">
    <button id="btnGridSize">改变 GridSize</button>
    <button id="btnMaxZoom">改变 MaxZoom</button>
    <button id="btnStyles">改变 Styles</button>
    <button id="btnAdd">添加 Markers</button>
    <button id="btnRemove">删除 Markers</button>
  </div>

  <!-- BMapGL -->
  <script src="//api.map.baidu.com/api?type=webgl&v=1.0&ak=您的密钥"></script>
  <!-- BMapGLLib.MarkerClusterer -->
  <script src="../src/MarkerClusterer.js"></script>

  <script>
    var map = new BMapGL.Map('container');
    map.centerAndZoom(new BMapGL.Point(116.404, 39.915), 4);
    map.enableScrollWheelZoom(true);

    /* ── 生成随机Markers ── */
    var MAX = 10;
    var markers = buildRandomMarkers(MAX);

    function buildRandomMarkers(count) {
      var list = [];
      for (var i = 0; i < count; i++) {
        var pt = new BMapGL.Point(Math.random() * 40 + 85, Math.random() * 30 + 21);
        list.push(new BMapGL.Marker(pt));
      }
      return list;
    }

    var markerClusterer = new BMapGLLib.MarkerClusterer(map, {
      markers: markers
      // gridSize:      默认 60
      // maxZoom:       默认 18
      // minClusterSize: 默认 2
    });

    document.getElementById('btnGridSize').onclick = function () {
      markerClusterer.setGridSize(100);
    };

    document.getElementById('btnMaxZoom').onclick = function () {
      markerClusterer.setMaxZoom(7);
    };

    document.getElementById('btnStyles').onclick = function () {
      markerClusterer.setStyles(myStyles);
    };

    var newMarkers = [];
    document.getElementById('btnAdd').onclick = function () {
      if (!newMarkers.length) {
        newMarkers = buildRandomMarkers(MAX);
      }
      markerClusterer.addMarkers(newMarkers);
    };

    document.getElementById('btnRemove').onclick = function () {
      markerClusterer.removeMarkers(newMarkers);
      newMarkers = [];
    };
